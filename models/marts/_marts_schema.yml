version: 2

models:
    - name: mart_monthly__account_agg
      columns:
        - name: account_id
          data_tests:
            - not_null
        - name: cal_month
          data_tests:
            - not_null
        - name: payment_status
          data_tests:
            - accepted_values:
                arguments:
                  values:
                    - 'Before Activate'
                    - 'First Payment'
                    - 'Retain'
                    - 'Stop Paying'
                    - 'Reactivate'
                    - 'Expansion'
                    - 'Contraction'
                    - 'Suspended'
      data_tests:
        - dbt_utils.unique_combination_of_columns:
            arguments:
              combination_of_columns:
                - account_id
                - cal_month
              config:
                where: "cal_month >= DATEADD(month, -3, current_date())"

    - name: mart_daily__log
      columns: 
        - name: usage_status
          data_tests:
            - accepted_values:
                arguments:
                  values: 
                    - 'Correct'
                    - 'Correct Not Used Before Start'
                    - 'Incorrect Used Before Start'
                    - 'Correct Not Used After Churn'
                    - 'Correct Not Used After Expiration'
                    - 'Incorrect Used After Churn'
                    - 'Incorrect Used After Expiration'
      data_tests:
        - dbt_utils.unique_combination_of_columns:
            arguments:
              combination_of_columns:
                - subscription_id
                - account_id 
                - cl_date
              config:
                where: "cl_date >= DATEADD(day, -3, current_date())"

        