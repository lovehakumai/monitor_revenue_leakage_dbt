version: 2

models:
    - name: fct_monthly__datespine
      columns:
        - name: subscription_id
          data_tests:
            - not_null
        - name: month_trunc
          data_tests:
            - not_null
        - name: account_id
          data_tests:
            - not_null
      data_tests:
        - dbt_utils.unique_combination_of_columns:
            arguments:
              combination_of_columns:
                - subscription_id
                - month_trunc
              config:
                where: "month_trunc >= DATEADD(month, -3, current_date())"
    - name: fct_monthly__usage_month
      columns: 
        - name: subscription_id
          data_tests: 
            - not_null
      data_tests:
        - dbt_utils.unique_combination_of_columns:
            arguments:
              combination_of_columns:
                - subscription_id
                - usage_month
              config:
                where: "usage_month >= DATEADD(month, -3, current_date())"

        